name: Deploy Backend → Hostinger VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}         # your VPS IP or hostname
          username: ${{ secrets.VPS_USER }}     # e.g. root or ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}       # contents of your private SSH key
          script: |
            set -e
            cd /var/www/btm-api
            git pull origin main
            cd backend
            npm ci --omit=dev
            pm2 restart btm-api || pm2 start server.js --name btm-api --interpreter node
            pm2 save
